<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewGreedy — Charts</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">NewGreedy</span>
  <div class="nav-links">
    <a href="/"         data-page="dashboard">Dashboard</a>
    <a href="/torrents" data-page="torrents">Torrents</a>
    <a href="/charts"   data-page="charts">Charts</a>
    <a href="/config"   data-page="config">Config</a>
    <a href="/logs"     data-page="logs">Logs</a>
    <a href="/help"     data-page="help">Help</a>
  </div>
  <div class="nav-right">
    <a id="ubadge" href="#"></a>
    <button id="ttheme">☀️</button>
  </div>
</nav>
<main>

<h1>Charts</h1>
<div class="toolbar">
  <label class="muted" style="font-size:12px;white-space:nowrap">Torrent:</label>
  <select id="sel" style="width:200px" onchange="loadChart()">
    <option value="">— Select —</option>
  </select>
  <span class="spacer"></span>
  <button class="btn" onclick="refresh()">⟳ Refresh</button>
</div>
<div id="nosel" class="sec" style="text-align:center;color:var(--mu);padding:48px">
  Select a torrent to display its history.
</div>
<div id="charea" style="display:none">
  <div id="infoline" class="sec" style="padding:14px 20px;margin-bottom:16px;font-size:13px;display:flex;gap:24px;flex-wrap:wrap"></div>
  <div class="ch-wrap"><h2>Cumulative Upload</h2><canvas id="cUL"></canvas></div>
  <div class="ch-wrap"><h2>Cumulative Download</h2><canvas id="cDL"></canvas></div>
  <div class="ch-wrap"><h2>Ratio over time</h2><canvas id="cRatio"></canvas></div>
</div>

</main>
<script src="/static/app.js"></script>
<script>

// ── helpers ──────────────────────────────────────────────────────────────────


var _charts={}, _stats={};
function mkChart(id,label,color,data,labels){
  if(_charts[id]) _charts[id].destroy();
  _charts[id]=new Chart(document.getElementById(id),{
    type:'line',
    data:{labels,datasets:[{
      label,data,
      borderColor:color,backgroundColor:color+'22',
      borderWidth:2,pointRadius:2,tension:.3,fill:true
    }]},
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#8b949e',maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{color:'#21262d'}},
        y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}
      }
    }
  });
}
function loadChart(){
  var ih=document.getElementById('sel').value;
  document.getElementById('nosel').style.display=ih?'none':'';
  document.getElementById('charea').style.display=ih?'':'none';
  if(!ih) return;
  API.get('/api/history/'+ih).then(hist=>{
    if(!hist||!hist.length){
      document.getElementById('charea').style.display='none';
      document.getElementById('nosel').style.display='';
      document.getElementById('nosel').textContent='No history available.';
      return;
    }
    var labels=hist.map(p=>new Date((p.t||p.ts||0)*1000).toLocaleTimeString());
    mkChart('cUL','UL','#58a6ff',hist.map(p=>+(p.ul/1e6).toFixed(1)),labels);
    mkChart('cDL','DL','#3fb950',hist.map(p=>+(p.dl/1e6).toFixed(1)),labels);
    var ratios=hist.map(p=>p.dl>0?+(p.ul/p.dl).toFixed(3):0);
    mkChart('cRatio','Ratio','#a371f7',ratios,labels);
    // infoline
    var d=_stats[ih]||{};
    var r=ratioNum(d);
    document.getElementById('infoline').innerHTML=
      '<span><b>Hash</b>: <span class="mono">'+ih+'</span></span>'
      +'<span><b>Mode</b>: '+modeTxt(d)+'</span>'
      +'<span><b>UL total</b>: '+fB(d.cumul_rep_ul)+'</span>'
      +'<span><b>DL total</b>: '+fB(d.cumul_rep_dl)+'</span>'
      +'<span><b>Ratio</b>: <b>'+(r!=null?fR(r):'—')+'</b></span>'
      +'<span><b>Announces</b>: '+(d.ann_count||0)+'</span>'
      +'<span><b>Status</b>: '+stag(d)+'</span>';
  }).catch(e=>console.error(e));
}
function refresh(){
  API.get('/api/stats').then(s=>{
    _stats=s;
    var sel=document.getElementById('sel'), cur=sel.value;
    sel.innerHTML='<option value="">— Select —</option>';
    Object.entries(s).forEach(([ih,d])=>{
      var o=document.createElement('option');
      var m=getMode(d);
      o.value=ih;
      o.textContent=ih+' ['+m+'] '+fR(ratioNum(d));
      sel.appendChild(o);
    });
    // auto-select from URL param
    var params=new URLSearchParams(location.search);
    var pih=params.get('ih');
    if(pih) sel.value=pih;
    else if(cur) sel.value=cur;
    loadChart();
  }).catch(e=>console.error(e));
}
// charger Chart.js puis init
var _s=document.createElement('script');
_s.src='https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
_s.onload=refresh;
document.head.appendChild(_s);

initUI('charts');
</script>
</body>
</html>
