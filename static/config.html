<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewGreedy — Config</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">NewGreedy</span>
  <div class="nav-links">
    <a href="/"         data-page="dashboard">Dashboard</a>
    <a href="/torrents" data-page="torrents">Torrents</a>
    <a href="/charts"   data-page="charts">Charts</a>
    <a href="/config"   data-page="config">Config</a>
    <a href="/logs"     data-page="logs">Logs</a>
    <a href="/help"     data-page="help">Help</a>
  </div>
  <div class="nav-right">
    <a id="ubadge" href="#"></a>
    <button id="ttheme">☀️</button>
  </div>
</nav>
<main>

<h1>Configuration</h1>
<div class="sec">
  <div class="sec-t">⚙ config.ini — current values</div>
  <textarea id="cfgview" rows="24" readonly style="font-size:12px" placeholder="Loading…"></textarea>
  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
    <button class="btn pri" onclick="reload()">⟳ Reload config.ini</button>
    <button class="btn" onclick="loadCfg()">↻ Refresh view</button>
  </div>
  <div class="alert hid" id="cfgalert"></div>
</div>
<div class="sec">
  <div class="sec-t">📤 Upload .torrent — pre-register</div>
  <div class="upzone"
       onclick="document.getElementById('fup').click()"
       ondragover="event.preventDefault();this.classList.add('over')"
       ondragleave="this.classList.remove('over')"
       ondrop="event.preventDefault();this.classList.remove('over');handleFiles(event.dataTransfer.files)">
    <div style="font-size:26px">📁</div>
    <div class="up-title">Drag a .torrent here</div>
    <div class="up-sub">Registers infohash + estimated size</div>
  </div>
  <input type="file" id="fup" accept=".torrent" multiple style="display:none" onchange="handleFiles(this.files)">
  <div class="alert hid" id="upalert"></div>
</div>

</main>
<script src="/static/app.js"></script>
<script>

// ── helpers ──────────────────────────────────────────────────────────────────


function sa(id,msg,t){var a=document.getElementById(id);a.textContent=msg;a.className='alert '+t;setTimeout(()=>a.className='alert hid',5000);}
function loadCfg(){
  API.get('/api/config').then(c=>{
    document.getElementById('cfgview').value=JSON.stringify(c,null,2);
  }).catch(e=>sa('cfgalert','Error: '+e.message,'er'));
}
function reload(){
  API.post('/api/config/reload',{}).then(d=>{
    sa('cfgalert','✓ Reloaded — '+JSON.stringify(d),'ok'); loadCfg();
  }).catch(e=>sa('cfgalert','Error: '+e.message,'er'));
}
function handleFiles(files){
  Array.from(files).forEach(f=>{
    var fd=new FormData(); fd.append('file',f);
    fetch('/api/upload',{method:'POST',body:fd}).then(r=>r.json())
      .then(d=>sa('upalert','✓ '+f.name+' — ih:'+d.infohash+' '+fB(d.size_estimate),'ok'))
      .catch(e=>sa('upalert','✗ '+e.message,'er'));
  });
}
loadCfg();

initUI('config');
</script>
</body>
</html>
