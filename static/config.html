<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Config — NewGreedy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="brand">🟢 NewGreedy</span>
      <span class="ver">v1.6.0</span>
    </div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/torrents">Torrents</a>
      <a href="/charts">Charts</a>
      <a href="/config">Config</a>
      <a href="/logs">Logs</a>
      <a href="/help">Help</a>
    </div>
  </nav>
  <div class="container">
    <h1>Configuration</h1>
    <p class="muted" style="margin-bottom:20px">Read-only view of <code>config.ini</code> — edit the file directly and restart to apply changes.</p>
    <div id="cfg-body"></div>
  </div>
<script>
async function load(){
  const cfg=await fetch('/api/config').then(r=>r.json());
  const el=document.getElementById('cfg-body');
  Object.entries(cfg).forEach(([sec,keys])=>{
    el.innerHTML+=`<div class="cfg-section"><h3>[${sec}]</h3><table>
      ${Object.entries(keys).map(([k,v])=>`<tr>
        <td class="cfg-key mono">${k}</td>
        <td class="cfg-val">${v}</td>
      </tr>`).join('')}</table></div>`;
  });
}
load();
</script>

</body>
</html>
