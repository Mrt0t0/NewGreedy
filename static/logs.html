<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Logs — NewGreedy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="brand">🟢 NewGreedy</span>
      <span class="ver">v1.6.0</span>
    </div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/torrents">Torrents</a>
      <a href="/charts">Charts</a>
      <a href="/config">Config</a>
      <a href="/logs">Logs</a>
      <a href="/help">Help</a>
    </div>
  </nav>
  <div class="container">
    <h1>Logs <span class="ws-badge" id="ws-status">Connecting...</span></h1>
    <div class="log-toolbar">
      <label class="log-opt"><input type="checkbox" id="f-seed" checked> SEEDING</label>
      <label class="log-opt"><input type="checkbox" id="f-dl"   checked> DOWNLOADING</label>
      <label class="log-opt"><input type="checkbox" id="f-stag" checked> STAG</label>
      <label class="log-opt"><input type="checkbox" id="f-stall"checked> STALL</label>
      <label class="log-opt"><input type="checkbox" id="f-err"  checked> ERRORS</label>
      <label class="log-opt"><input type="checkbox" id="f-dead" checked> DEAD_TRACKER</label>
      <label class="log-opt"><input type="checkbox" id="f-conv" checked> CONV_DONE</label>
      <input id="f-hash" placeholder="Filter by hash…" style="background:var(--surface);color:var(--text);border:1px solid var(--border);padding:4px 10px;border-radius:4px;font-size:12px;width:160px">
      <button class="btn-outline" onclick="document.getElementById('log-box').innerHTML=''">Clear</button>
    </div>
    <div id="log-box"></div>
  </div>
<script>
const box=document.getElementById('log-box');
const MAX=500;
function classify(l){
  if(l.includes('DEAD_TRACKER'))   return 'log-dead';
  if(l.includes('STALL_ALGO'))     return 'log-stall';
  if(l.includes('STALL_NET'))      return 'log-stall';
  if(l.includes('STAG_PROLONGED')) return 'log-stag';
  if(l.includes('[STAG]'))         return 'log-stag';
  if(l.includes('CONV_DONE'))      return 'log-conv';
  if(l.includes('SEEDING'))        return 'log-seed';
  if(l.includes('DOWNLOADING'))    return 'log-dl';
  if(l.includes('ERROR')||l.includes('error')) return 'log-err';
  return '';
}
function visible(l){
  const h=document.getElementById('f-hash').value.trim().toLowerCase();
  if(h && !l.toLowerCase().includes(h)) return false;
  if(l.includes('SEEDING')    && !document.getElementById('f-seed').checked)  return false;
  if(l.includes('DOWNLOADING')&& !document.getElementById('f-dl').checked)    return false;
  if((l.includes('STAG'))     && !document.getElementById('f-stag').checked)  return false;
  if((l.includes('STALL'))    && !document.getElementById('f-stall').checked) return false;
  if((l.includes('ERROR')||l.includes('error'))&&!document.getElementById('f-err').checked) return false;
  if(l.includes('DEAD_TRACKER')&&!document.getElementById('f-dead').checked)  return false;
  if(l.includes('CONV_DONE')  && !document.getElementById('f-conv').checked)  return false;
  return true;
}
function append(line){
  if(!visible(line)) return;
  const d=document.createElement('div');
  d.className='log-line '+classify(line);
  d.textContent=line;
  box.appendChild(d);
  while(box.children.length>MAX) box.removeChild(box.firstChild);
  box.scrollTop=box.scrollHeight;
}
const ws=new WebSocket(`ws://${location.host}/ws/logs`);
const badge=document.getElementById('ws-status');
ws.onopen=()=>{ badge.className='ws-badge ws-ok'; badge.textContent='Live'; };
ws.onmessage=e=>append(e.data);
ws.onerror=ws.onclose=()=>{ badge.className='ws-badge ws-err'; badge.textContent='Disconnected'; };
fetch('/api/logs?n=200').then(r=>r.json()).then(d=>d.lines.forEach(append));
</script>

</body>
</html>
