<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewGreedy — Logs</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">NewGreedy</span>
  <div class="nav-links">
    <a href="/"         data-page="dashboard">Dashboard</a>
    <a href="/torrents" data-page="torrents">Torrents</a>
    <a href="/charts"   data-page="charts">Charts</a>
    <a href="/config"   data-page="config">Config</a>
    <a href="/logs"     data-page="logs">Logs</a>
    <a href="/help"     data-page="help">Help</a>
  </div>
  <div class="nav-right">
    <a id="ubadge" href="#"></a>
    <button id="ttheme">☀️</button>
  </div>
</nav>
<main>

<h1>Live Logs</h1>
<div class="sec">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <span style="display:flex;align-items:center">
      <span class="wdot" id="wdot"></span>
      <span id="wstatus" class="muted" style="font-size:12px">Connecting…</span>
    </span>
    <span class="spacer"></span>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu);cursor:pointer">
      <input type="checkbox" id="autoscroll" checked> Auto-scroll
    </label>
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu);cursor:pointer">
      <input type="checkbox" id="showAll" checked> Show all
    </label>
    <button class="btn active" id="fAll"   onclick="setLvl('all',this)">All</button>
    <button class="btn"        id="fWarn"  onclick="setLvl('warn',this)">Warn</button>
    <button class="btn"        id="fErr"   onclick="setLvl('err',this)">Error</button>
    <select id="filterHash" style="width:140px;padding:4px 8px;font-size:12px">
      <option value="">— Hash —</option>
    </select>
    <button class="btn" onclick="clearL()">✕ Clear</button>
    <button class="btn pri" onclick="dlLogs()">⬇ Download</button>
  </div>
  <div class="logarea" id="logarea"></div>
</div>
<div class="sec">
  <div class="sec-t">📊 Log analysis</div>
  <div class="cards" style="margin-bottom:12px" id="logstats">
    <div class="card"><div class="clbl">Total lines</div><div class="cval" id="ls_tot">0</div></div>
    <div class="card"><div class="clbl">TARGET REACHED</div><div class="cval tg" id="ls_tgt">0</div></div>
    <div class="card"><div class="clbl">STALL_NET</div><div class="cval er" id="ls_stall">0</div></div>
    <div class="card"><div class="clbl">STAG</div><div class="cval wa" id="ls_stag">0</div></div>
    <div class="card"><div class="clbl">GLOBAL_CAP</div><div class="cval wa" id="ls_cap">0</div></div>
    <div class="card"><div class="clbl">TRACKER_DOWN</div><div class="cval er" id="ls_td">0</div></div>
    <div class="card"><div class="clbl">PURGED</div><div class="cval muted" id="ls_purge">0</div></div>
  </div>
  <div id="tracker_ratio_bar" style="display:none;margin-bottom:0"></div>
</div>

</main>
<script src="/static/app.js"></script>
<script>

// ── helpers ──────────────────────────────────────────────────────────────────


var _ws=null, _lines=[], _max=1200, _hashes=new Set();

var _lvl='all';
function setLvl(l,el){
  _lvl=l;
  document.querySelectorAll('#fAll,#fWarn,#fErr').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  rerender();
}
function clf(t){
  if(/TARGET_REACHED/i.test(t)) return 'll tgt';
  if(/PURGED/i.test(t))          return 'll ok';
  if(/GLOBAL_CAP|TRACKER_DOWN|TRACKER_UP/i.test(t)) return 'll warn';
  if(/ERROR|FAIL|EXCEPTION/i.test(t)) return 'll err';
  if(/STALL_NET|STALL_ALGO/i.test(t)) return 'll stall';
  if(/\[STAG\]/i.test(t))       return 'll stag';
  if(/WARNING|WARN/i.test(t))    return 'll warn';
  return 'll info';
}
function lvlOk(cls){
  if(_lvl==='all')  return true;
  if(_lvl==='warn') return cls!=='ll info';
  if(_lvl==='err')  return cls==='ll err'||cls==='ll stall';
  return true;
}

function updateStats(){
  document.getElementById('ls_tot').textContent=_lines.length;
  document.getElementById('ls_tgt').textContent=_lines.filter(l=>/TARGET_REACHED/i.test(l)).length;
  document.getElementById('ls_stall').textContent=_lines.filter(l=>/STALL_NET/i.test(l)).length;
  document.getElementById('ls_stag').textContent=_lines.filter(l=>/\[STAG\]/i.test(l)).length;
  document.getElementById('ls_cap').textContent=_lines.filter(l=>/GLOBAL_CAP/i.test(l)).length;
  document.getElementById('ls_td').textContent=_lines.filter(l=>/TRACKER_DOWN/i.test(l)).length;
  document.getElementById('ls_purge').textContent=_lines.filter(l=>/PURGED/i.test(l)).length;
  fetch('/api/tracker_stats').then(r=>r.json()).then(tc=>{
    var bar=document.getElementById('tracker_ratio_bar');
    var entries=Object.entries(tc);
    if(!entries.length){bar.style.display='none';return;}
    bar.style.display='block';
    bar.innerHTML='<div class="sec-t" style="margin-bottom:8px">📡 Tracker ratio</div>'+
      entries.map(([dom,v])=>{
        var pct=v.pct_of_cap||0;
        var col=pct>=90?'var(--er)':pct>=70?'var(--wa)':'var(--ok)';
        return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px">'
          +'<span class="mono" style="min-width:180px;color:var(--mu)">'+dom+'</span>'
          +'<div style="flex:1;height:6px;background:var(--bg3);border-radius:3px">'
          +'<div style="width:'+Math.min(100,pct).toFixed(1)+'%;height:100%;background:'+col+';border-radius:3px"></div></div>'
          +'<span style="min-width:50px;text-align:right;color:'+col+'">'+(v.ratio!=null?v.ratio.toFixed(3):'—')+'</span>'
          +'<span style="color:var(--mu)">/ '+v.cap+'</span>'
          +'</div>';
      }).join('');
  }).catch(()=>{});
}

function extractHash(t){
  // format: [MODE] HASH | ...  ou  [PURGED] HASH
  var m=t.match(/\]\s+([0-9a-f]{8})/i);
  return m?m[1].toLowerCase():null;
}

function appendLine(t){
  _lines.push(t);
  if(_lines.length>_max) _lines.shift();
  // hash index
  var h=extractHash(t);
  if(h&&!_hashes.has(h)){
    _hashes.add(h);
    var sel=document.getElementById('filterHash');
    var o=document.createElement('option');o.value=h;o.textContent=h;sel.appendChild(o);
  }
  // filter
  var fh=document.getElementById('filterHash').value;
  var showAll=document.getElementById('showAll').checked;
  if(fh && !t.includes(fh)) return;
  var c=clf(t);
  if(!showAll && c==='ll info' && !/\[SEED\]|\[DOWN\]/i.test(t)) return;
  if(!lvlOk(c)) return;
  var la=document.getElementById('logarea');
  var d=document.createElement('div'); d.className=clf(t); d.textContent=t;
  la.appendChild(d);
  while(la.children.length>_max) la.removeChild(la.firstChild);
  if(document.getElementById('autoscroll').checked) la.scrollTop=la.scrollHeight;
  updateStats();
}

function rerender(){
  var la=document.getElementById('logarea'); la.innerHTML='';
  var fh=document.getElementById('filterHash').value;
  var showAll=document.getElementById('showAll').checked;
  _lines.forEach(t=>{
    if(fh && !t.includes(fh)) return;
    var c=clf(t);
    if(!showAll && c==='ll info' && !/\[SEED\]|\[DOWN\]/i.test(t)) return;
    if(!lvlOk(c)) return;
    var d=document.createElement('div'); d.className=clf(t); d.textContent=t;
    la.appendChild(d);
  });
  if(document.getElementById('autoscroll').checked) la.scrollTop=la.scrollHeight;
}
document.getElementById('filterHash').addEventListener('change',rerender);
document.getElementById('showAll').addEventListener('change',rerender);

function clearL(){document.getElementById('logarea').innerHTML='';_lines=[];}
function dlLogs(){
  var b=new Blob([_lines.join('\n')],{type:'text/plain'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='newgreedy-'+new Date().toISOString().slice(0,10)+'.log';a.click();
}

function connect(){
  var proto=location.protocol==='https:'?'wss:':'ws:';
  _ws=new WebSocket(proto+'//'+location.host+'/ws/logs');
  _ws.onopen=()=>{
    document.getElementById('wdot').className='wdot on';
    document.getElementById('wstatus').textContent='Connected';
  };
  _ws.onclose=()=>{
    document.getElementById('wdot').className='wdot';
    document.getElementById('wstatus').textContent='Disconnected — reconnecting…';
    setTimeout(connect,3000);
  };
  _ws.onerror=()=>{document.getElementById('wstatus').textContent='WS Error';};
  _ws.onmessage=e=>{
    try{
      var d=JSON.parse(e.data);
      if(d.lines) d.lines.forEach(appendLine);
      else if(d.line) appendLine(d.line);
    }catch(x){appendLine(e.data);}
  };
}
connect();

initUI('logs');
</script>
</body>
</html>
