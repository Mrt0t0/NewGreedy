<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logs — NewGreedy</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar">
  <span class="brand">🟢 NewGreedy <span class="ver">v1.5.1</span></span>
  <div class="nav-links">
    <a href="/">Dashboard</a><a href="/static/torrents.html">Torrents</a>
    <a href="/static/charts.html">Charts</a><a href="/static/config.html">Config</a>
    <a href="/static/logs.html" class="active">Logs</a>
  </div>
</nav>
<main class="container">
  <h1>Live Logs</h1>
  <div class="log-toolbar">
    <div id="health-summary" class="muted"></div>
    <label class="log-opt"><input type="checkbox" id="autoScroll" checked> Auto-scroll</label>
    <label class="log-opt"><input type="checkbox" id="hideDebug" checked> Hide DEBUG</label>
    <label class="log-opt"><input type="checkbox" id="filterStag"> STAG/STALL only</label>
    <button class="btn btn-sm" onclick="clearLog()">Clear</button>
  </div>
  <div id="log-box"></div>
  <div id="ws-status" class="ws-badge">⏳ Connecting…</div>
</main>
<script>
const box = document.getElementById("log-box");
const wsStatus = document.getElementById("ws-status");
let lines = [];

function shouldShow(l){
  if(document.getElementById("filterStag").checked)
    return l.includes("[STAG]") || l.includes("[STALL]");
  if(document.getElementById("hideDebug").checked)
    if(l.includes("[DEBUG]") || l.includes(" DEBUG ")) return false;
  return true;
}

function colorLine(l){
  if(l.includes("[STALL]")) return "log-stall";
  if(l.includes("[STAG]"))  return "log-stag";
  if(l.includes("ERROR"))   return "log-err";
  if(l.includes("SEEDING")) return "log-seed";
  if(l.includes("DOWNLOADING")) return "log-dl";
  return "";
}

function addLine(l){ lines.push(l); if(lines.length>500) lines.shift(); render(); }
function clearLog(){ lines=[]; box.innerHTML=""; }

function render(){
  box.innerHTML = lines
    .filter(shouldShow)
    .map(l=>`<div class="log-line ${colorLine(l)}">${escHtml(l)}</div>`)
    .join("");
  if(document.getElementById("autoScroll").checked) box.scrollTop = box.scrollHeight;
}

function escHtml(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

["filterStag","hideDebug"].forEach(id=>
  document.getElementById(id).addEventListener("change", render)
);

async function loadHealth(){
  try{
    const h = await fetch("/api/health").then(r=>r.json());
    document.getElementById("health-summary").textContent =
      `Tracked: ${h.total}  |  Stalled: ${(h.stalled||[]).length}  |  Anomalies: ${(h.anomalies||[]).length}`;
  }catch(e){}
}

async function loadInitialLogs(){
  try{
    const data = await fetch("/api/logs?lines=100").then(r=>r.json());
    (data.lines||[]).forEach(l=>addLine(l.trim()));
  }catch(e){}
}

function connectWS(){
  const proto = location.protocol==="https:"?"wss":"ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws/logs`);
  ws.onopen = ()=>{ wsStatus.textContent="🟢 Live"; wsStatus.className="ws-badge ws-ok"; };
  ws.onmessage = e => addLine(e.data);
  ws.onclose = ()=>{
    wsStatus.textContent="🔴 Disconnected — retry in 5s";
    wsStatus.className="ws-badge ws-err";
    setTimeout(connectWS,5000);
  };
  ws.onerror = ()=> ws.close();
}

loadHealth(); loadInitialLogs(); connectWS();
setInterval(loadHealth,10000);
</script>
</body>
</html>
