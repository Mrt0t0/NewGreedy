<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewGreedy — Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">NewGreedy</span>
  <div class="nav-links">
    <a href="/"         data-page="dashboard">Dashboard</a>
    <a href="/torrents" data-page="torrents">Torrents</a>
    <a href="/charts"   data-page="charts">Charts</a>
    <a href="/config"   data-page="config">Config</a>
    <a href="/logs"     data-page="logs">Logs</a>
    <a href="/help"     data-page="help">Help</a>
  </div>
  <div class="nav-right">
    <a id="ubadge" href="#"></a>
    <button id="ttheme">☀️</button>
  </div>
</nav>
<main>

<h1>Dashboard</h1>
<div class="cards">
  <div class="card"><div class="clbl">Total</div><div class="cval" id="c_tot">—</div></div>
  <div class="card"><div class="clbl">Seeding</div><div class="cval ok" id="c_seed">—</div></div>
  <div class="card"><div class="clbl">Downloading</div><div class="cval ac" id="c_down">—</div></div>
  <div class="card"><div class="clbl">Stalled</div><div class="cval er" id="c_stall">—</div></div>
  <div class="card"><div class="clbl">Target ✓</div><div class="cval tg" id="c_tgt">—</div></div>
  <div class="card"><div class="clbl">Total UL</div><div class="cval" id="c_ul">—</div></div>
  <div class="card"><div class="clbl">Total DL</div><div class="cval" id="c_dl">—</div></div>
</div>
<div id="tracker_warn" style="display:none;margin-bottom:14px"></div>
<div class="toolbar">
  <button class="btn active" onclick="setF('all',this)">All</button>
  <button class="btn" onclick="setF('seed',this)">Seed</button>
  <button class="btn" onclick="setF('down',this)">Downloading</button>
  <button class="btn" onclick="setF('stall',this)">Stalled</button>
  <button class="btn" onclick="setF('tgt',this)">Target</button>
  <span class="spacer"></span>
  <button class="btn" onclick="load()">⟳ Refresh</button>
</div>
<div class="twrap">
  <table>
    <thead><tr>
      <th>Hash</th><th>Mode</th><th>DL</th><th>UL</th>
      <th>Ratio</th><th>Progress</th><th>ETA</th><th>Ann#</th><th>Status</th>
    </tr></thead>
    <tbody id="tbody"><tr><td colspan="9" style="text-align:center;padding:20px" class="muted">Loading…</td></tr></tbody>
  </table>
</div>
<div class="ts" id="ts" style="margin-top:8px"></div>

</main>
<script src="/static/app.js"></script>
<script>

// ── helpers ──────────────────────────────────────────────────────────────────


var _data={}, _filter='all', _tgt=1.6;
function setF(f,el){
  _filter=f;
  document.querySelectorAll('.toolbar .btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); render();
}
function render(){
  var entries=Object.entries(_data);
  var rows=entries.filter(([ih,d])=>{
    var m=getMode(d);
    if(_filter==='all')   return true;
    if(_filter==='seed')  return m==='SEED';
    if(_filter==='down')  return m==='DOWN';
    if(_filter==='stall') return m==='STALL';
    if(_filter==='tgt')   return m==='TARGET';
    return true;
  });
  var tb=document.getElementById('tbody');
  if(!rows.length){
    tb.innerHTML='<tr><td colspan="9" style="text-align:center;padding:20px" class="muted">No data</td></tr>';
    return;
  }
  tb.innerHTML=rows.map(([ih,d])=>{
    var r=ratioNum(d);
    var eta=d.ann_count>1&&d.cumul_rep_dl>0
      ? Math.round(Math.max(0,d.cumul_rep_dl*_tgt-d.cumul_rep_ul)/(d.cumul_rep_ul/d.ann_count))
      : 0;
    return '<tr>'
      +'<td class="mono"><a href="/charts?ih='+ih+'" style="color:var(--mu)">'+ih+'</a></td>'
      +'<td>'+modeTxt(d)+'</td>'
      +'<td class="mono">'+fB(d.cumul_rep_dl)+'</td>'
      +'<td class="mono">'+fB(d.cumul_rep_ul)+'</td>'
      +'<td class="mono">'+(r!=null?fR(r):'—')+'</td>'
      +'<td>'+rbar(r,_tgt)+'</td>'
      +'<td class="mono muted">'+fE(eta)+'</td>'
      +'<td class="mono muted">'+(d.ann_count||0)+'</td>'
      +'<td>'+stag(d)+'</td>'
      +'</tr>';
  }).join('');
}
function load(){
  Promise.all([API.get('/api/stats'),API.get('/api/config')])
  .then(([s,c])=>{
    _tgt=parseFloat((c.spoofing&&c.spoofing.target_ratio)||1.6)||1.6;
    _data=s;
    var v=Object.values(s);
    document.getElementById('c_tot').textContent=v.length;
    document.getElementById('c_seed').textContent=v.filter(d=>getMode(d)==='SEED').length;
    document.getElementById('c_down').textContent=v.filter(d=>getMode(d)==='DOWN').length;
    document.getElementById('c_stall').textContent=v.filter(d=>getMode(d)==='STALL').length;
    document.getElementById('c_tgt').textContent=v.filter(d=>getMode(d)==='TARGET').length;
    document.getElementById('c_ul').textContent=fB(v.reduce((a,d)=>a+(d.cumul_rep_ul||0),0));
    document.getElementById('c_dl').textContent=fB(v.reduce((a,d)=>a+(d.cumul_rep_dl||0),0));
    document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();
    render();
  })
  .catch(e=>{
    document.getElementById('tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--er)">API error: '+e.message+'</td></tr>';
  });
  fetch('/api/tracker_stats').then(r=>r.json()).then(tc=>{
    var w=document.getElementById('tracker_warn');
    var alerts=Object.entries(tc).filter(([d,v])=>v.pct_of_cap!=null&&v.pct_of_cap>=80);
    if(!alerts.length){w.style.display='none';return;}
    w.style.display='block';
    w.innerHTML='<div style="background:rgba(210,153,34,.1);border:1px solid var(--wa);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--wa)">'
      +'⚠ Global ratio cap warning: '
      +alerts.map(([d,v])=>'<b>'+d+'</b> at '+v.ratio.toFixed(3)+' / '+v.cap+' ('+v.pct_of_cap.toFixed(0)+'%)').join(', ')
      +'</div>';
  }).catch(()=>{});
}
load(); setInterval(load,15000);

initUI('dashboard');
</script>
</body>
</html>
