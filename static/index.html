<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — NewGreedy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="brand">NewGreedy</span>
      <span class="ver">v1.6.0</span>
    </div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/torrents">Torrents</a>
      <a href="/charts">Charts</a>
      <a href="/config">Config</a>
      <a href="/logs">Logs</a>
      <a href="/help">Help</a>
    </div>
  </nav>
  <div class="container">
    <h1>Dashboard <span class="badge" id="ts"></span></h1>

    <div class="health-bar" id="health-bar">
      <span class="hb-item"><span class="hb-dot hb-ok"></span> Loading...</span>
    </div>

    <div id="alerts"></div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val" id="k-active">—</div><div class="kpi-lbl">Active Torrents</div></div>
      <div class="kpi"><div class="kpi-val" id="k-cumul">—</div><div class="kpi-lbl">Total CumUL (GB)</div></div>
      <div class="kpi"><div class="kpi-val" id="k-ratio">—</div><div class="kpi-lbl">Avg Ratio</div></div>
      <div class="kpi"><div class="kpi-val" id="k-ann">—</div><div class="kpi-lbl">Total Announces</div></div>
      <div class="kpi"><div class="kpi-val" id="k-errors">—</div><div class="kpi-lbl">Connect Errors</div></div>
      <div class="kpi"><div class="kpi-val" id="k-dead">—</div><div class="kpi-lbl">Dead Trackers</div></div>
    </div>

    <h3>Active Torrents <span class="badge" id="active-note"></span></h3>
    <table>
      <thead><tr>
        <th>Hash</th><th>Mode</th><th>CumDL</th><th>RealUL</th>
        <th>CumUL</th><th>Ratio</th><th>Progress</th><th>Ann#</th><th>Status</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

<script>
// Seuil : torrent considéré actif si dernière announce < 3h
const ACTIVE_TTL = 3 * 3600;
const now_ts = () => Date.now() / 1000;

function isRecent(d) {
  const ts = d.last_ann_ts || 0;
  return ts > 0 && (now_ts() - ts) < ACTIVE_TTL;
}

function mode(d) {
  if (d.ended)        return '<span class="tag end">END</span>';
  if (d.conv_done)    return '<span class="tag conv">CONV</span>';
  if (!d.cumul_rep_dl)return '<span class="tag seed">SEED</span>';
  return '<span class="tag dl">DL+SEED</span>';
}

function statusTag(d) {
  const t = [];
  if (d.is_stalled_net)         t.push('<span class="tag stall">STALL_NET</span>');
  if (d.is_stalled_algo)        t.push('<span class="tag err">STALL_ALGO</span>');
  if ((d.stag_count||0) >= 3)   t.push('<span class="tag warn">STAG×' + d.stag_count + '</span>');
  if (d.conv_done)              t.push('<span class="tag conv">CONV</span>');
  if ((d.cumul_real_ul||0) > 0) t.push('<span class="tag active-ul">SEED ACTIVE</span>');
  return t.join(' ') || '<span class="tag ok">OK</span>';
}

async function refresh() {
  const [s, h] = await Promise.all([
    fetch('/api/stats').then(r => r.json()),
    fetch('/api/health').then(r => r.json())
  ]);

  document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString();

  // Filtrer : uniquement torrents avec announce récente et non ended
  const entries = Object.entries(s).filter(([, d]) => isRecent(d) && !d.ended);

  let totUL = 0, totAnn = 0, ratios = [];
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';

  entries.sort((a, b) => (b[1].cumul_rep_ul || 0) - (a[1].cumul_rep_ul || 0))
    .forEach(([ih, d]) => {
      const ul    = d.cumul_rep_ul || 0;
      const dl    = d.cumul_rep_dl || 0;
      const ratio = dl > 0 ? ul / dl : 0;
      totUL  += ul;
      totAnn += d.ann_count || 0;
      ratios.push(ratio);

      const target = d.target_ratio || 1.6;
      const pct    = Math.min(100, (ratio / target) * 100).toFixed(1);

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="mono">${ih.slice(0, 8)}</td>
        <td>${mode(d)}</td>
        <td>${(dl / 1e6).toFixed(0)} MB</td>
        <td>${((d.cumul_real_ul || 0) / 1e6).toFixed(1)} MB</td>
        <td>${(ul / 1e6).toFixed(0)} MB</td>
        <td>${ratio.toFixed(3)}</td>
        <td>
          <span class="bar-bg"><span class="bar-fill" style="width:${pct}%"></span></span>
          <span class="bar-pct">${pct}%</span>
        </td>
        <td>${d.ann_count || 0}</td>
        <td>${statusTag(d)}</td>`;
      tb.appendChild(tr);
    });

  document.getElementById('k-active').textContent  = entries.length;
  document.getElementById('k-cumul').textContent   = (totUL / 1e9).toFixed(2) + ' GB';
  document.getElementById('k-ratio').textContent   = ratios.length
    ? (ratios.reduce((a, b) => a + b, 0) / ratios.length).toFixed(3) : '—';
  document.getElementById('k-ann').textContent     = totAnn;
  document.getElementById('k-errors').textContent  = h.connect_errors || 0;
  document.getElementById('k-dead').textContent    = (h.dead_trackers || []).length;

  const totalInStats = Object.keys(s).length;
  if (totalInStats > entries.length) {
    document.getElementById('active-note').textContent =
      `(${totalInStats - entries.length} older entries hidden — see Torrents page)`;
  }

  if (h.connect_errors > 0)
    document.getElementById('k-errors').closest('.kpi').className = 'kpi warn';
  if ((h.dead_trackers || []).length > 0)
    document.getElementById('k-dead').closest('.kpi').className = 'kpi err';

  // Health bar
  const hb = document.getElementById('health-bar');
  hb.innerHTML = '';
  const add = (cls, txt) => {
    const s = document.createElement('span');
    s.className = 'hb-item';
    s.innerHTML = `<span class="hb-dot ${cls}"></span>${txt}`;
    hb.appendChild(s);
  };
  add('hb-ok', entries.length + ' active');
  if ((h.stall_algo || []).length)     add('hb-err',  'STALL_ALGO: '     + h.stall_algo.length);
  if ((h.stag_prolonged || []).length) add('hb-warn', 'STAG: '           + h.stag_prolonged.length);
  if ((h.dead_trackers || []).length)  add('hb-dead', 'Dead trackers: '  + h.dead_trackers.length);
  if ((h.ended || []).length)          add('hb-warn', 'Ended: '          + h.ended.length);

  // Alerts
  const al = document.getElementById('alerts');
  al.innerHTML = '';
  (h.dead_trackers || []).forEach(dt => {
    al.innerHTML += `<div class="alert dead">Dead tracker: <b>${dt.domain}</b> — resets in ${dt.expires_in_h}h</div>`;
  });
  (h.stall_algo || []).forEach(ih => {
    al.innerHTML += `<div class="alert err">STALL_ALGO: ${ih}</div>`;
  });
}

refresh();
setInterval(refresh, 15000);
</script>

</body>
</html>
