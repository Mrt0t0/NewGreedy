<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Torrents — NewGreedy</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar">
  <span class="brand">🟢 NewGreedy <span class="ver">v1.5.1</span></span>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/static/torrents.html" class="active">Torrents</a>
    <a href="/static/charts.html">Charts</a>
    <a href="/static/config.html">Config</a>
    <a href="/static/logs.html">Logs</a>
  </div>
</nav>
<main class="container">
  <h1>Torrents <span id="count" class="badge"></span></h1>
  <table>
    <thead><tr>
      <th>Hash</th><th>CumDL</th><th>RealUL</th><th>CumUL (SentUL)</th><th>Ratio</th><th>Target</th><th>Progress</th><th>Ann#</th><th>Status</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
<script>
function fmt(b){ return b && b>0 ? (b/1e6).toFixed(1)+" MB" : "0 MB"; }
const TARGET = 1.63;

async function load(){
  let stats={}, health={stalled:[],anomalies:[]};
  try { stats  = await fetch("/api/stats").then(r=>r.json()); } catch(e){}
  try { health = await fetch("/api/health").then(r=>r.json()); } catch(e){}

  const entries = Object.entries(stats);
  document.getElementById("count").textContent = entries.length;
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  for(const [ih, d] of entries){
    const ratio   = d.cumul_rep_dl>0 ? d.cumul_rep_ul/d.cumul_rep_dl : null;
    const ratioStr= ratio!==null ? ratio.toFixed(3) : "—";
    const pct     = ratio!==null ? Math.min(100, ratio/TARGET*100).toFixed(0) : 0;
    const stalled = (health.stalled||[]).includes(ih);
    const anomaly = (health.anomalies||[]).includes(ih);
    const status  = stalled
      ? "<span class=\'tag stall\'>STALL</span>"
      : anomaly
        ? "<span class=\'tag warn\'>ANOMALY</span>"
        : "<span class=\'tag ok\'>OK</span>";
    tbody.innerHTML += `<tr>
      <td class="mono">${ih}</td>
      <td>${fmt(d.cumul_rep_dl)}</td>
      <td>${fmt(d.cumul_real_ul)}</td>
      <td>${fmt(d.cumul_rep_ul)}</td>
      <td><span style="font-weight:600">${ratioStr}</span></td>
      <td>${TARGET}</td>
      <td>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="bar-pct">${pct}%</span>
      </td>
      <td>${d.ann_count||0}</td>
      <td>${status}</td>
    </tr>`;
  }
}
load(); setInterval(load,15000);
</script>
</body>
</html>
