<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NewGreedy — Torrents</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <span class="brand">NewGreedy</span>
  <div class="nav-links">
    <a href="/"         data-page="dashboard">Dashboard</a>
    <a href="/torrents" data-page="torrents">Torrents</a>
    <a href="/charts"   data-page="charts">Charts</a>
    <a href="/config"   data-page="config">Config</a>
    <a href="/logs"     data-page="logs">Logs</a>
    <a href="/help"     data-page="help">Help</a>
  </div>
  <div class="nav-right">
    <a id="ubadge" href="#"></a>
    <button id="ttheme">☀️</button>
  </div>
</nav>
<main>

<h1>Torrents</h1>
<div class="sec">
  <div class="sec-t">📤 Upload .torrent — pre-register infohash & size</div>
  <div class="upzone" id="upzone"
       onclick="document.getElementById('fup').click()"
       ondragover="event.preventDefault();this.classList.add('over')"
       ondragleave="this.classList.remove('over')"
       ondrop="event.preventDefault();this.classList.remove('over');handleFiles(event.dataTransfer.files)">
    <div style="font-size:30px">📁</div>
    <div class="up-title">Drag & drop a .torrent here</div>
    <div class="up-sub">or click to browse — multiple files supported</div>
  </div>
  <input type="file" id="fup" accept=".torrent" multiple style="display:none" onchange="handleFiles(this.files)">
  <div class="alert hid" id="upalert"></div>
</div>
<div class="toolbar">
  <button class="btn active" onclick="setF('all',this)">All</button>
  <button class="btn" onclick="setF('seed',this)">Seed</button>
  <button class="btn" onclick="setF('down',this)">Downloading</button>
  <button class="btn" onclick="setF('stall',this)">Stalled</button>
  <button class="btn" onclick="setF('tgt',this)">Target</button>
  <span class="spacer"></span>
  <button class="btn dan" onclick="purge()">🗑 Purge done</button>
  <button class="btn dan" onclick="purgeInactive()">⏱ Purge inactive 12h</button>
  <button class="btn" onclick="window.open('/api/stats/csv','_blank')">⬇ CSV</button>
  <button class="btn" onclick="load()">⟳ Refresh</button>
</div>
<div class="twrap">
  <table>
    <thead><tr>
      <th>Hash</th><th>Mode</th><th>Real DL</th><th>Real UL</th><th>Inj. UL</th><th>Ratio</th><th>Progress</th>
      <th>ETA</th><th>Ann#</th><th>Last seen</th><th>Status</th>
    </tr></thead>
    <tbody id="tbody"><tr><td colspan="11" style="text-align:center;padding:20px" class="muted">Loading…</td></tr></tbody>
  </table>
</div>
<div class="ts" id="ts" style="margin-top:8px"></div>

</main>
<script src="/static/app.js"></script>
<script>

// ── helpers ──────────────────────────────────────────────────────────────────


var _data={}, _filter='all', _tgt=1.6;
function setF(f,el){
  _filter=f;
  document.querySelectorAll('.toolbar .btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); render();
}
function render(){
  var rows=Object.entries(_data).filter(([ih,d])=>{
    var m=getMode(d);
    if(_filter==='all')   return true;
    if(_filter==='seed')  return m==='SEED';
    if(_filter==='down')  return m==='DOWN';
    if(_filter==='stall') return m==='STALL';
    if(_filter==='tgt')   return m==='TARGET';
    return true;
  });
  var tb=document.getElementById('tbody');
  if(!rows.length){
    tb.innerHTML='<tr><td colspan="11" style="text-align:center;padding:20px" class="muted">No data</td></tr>';
    return;
  }
  tb.innerHTML=rows.map(([ih,d])=>{
    var r=ratioNum(d);
    var eta=d.ann_count>1&&d.cumul_rep_dl>0
      ? Math.round(Math.max(0,d.cumul_rep_dl*_tgt-d.cumul_rep_ul)/(d.cumul_rep_ul/d.ann_count))
      : 0;
    return '<tr>'
      +'<td class="mono"><a href="/charts?ih='+ih+'" style="color:var(--mu)">'+ih+'</a></td>'
      +'<td>'+modeTxt(d)+'</td>'
      +'<td class="mono">'+(d.cumul_rep_dl>0?fB(d.cumul_rep_dl):'<span class="muted">—</span>')+'</td>'
      +'<td class="mono muted">'+fB(d.cumul_real_ul||0)+'</td>'
      +'<td class="mono">'+fB(d.cumul_rep_ul)+'</td>'
      +'<td class="mono">'+(r!=null?fR(r):'<span class="muted">—</span>')+'</td>'
      +'<td>'+rbar(r,_tgt)+'</td>'
      +'<td class="mono muted">'+fE(eta)+'</td>'
      +'<td class="mono muted">'+(d.ann_count||0)+'</td>'
      +'<td class="mono muted">'+fAge(d.last_announce_ts)+'</td>'
      +'<td>'+stag(d)+'</td>'
      +'</tr>';
  }).join('');
}
function sa(msg,type){
  var a=document.getElementById('upalert');
  a.textContent=msg; a.className='alert '+type;
  setTimeout(()=>a.className='alert hid',6000);
}
function handleFiles(files){
  Array.from(files).forEach(f=>{
    var fd=new FormData(); fd.append('file',f);
    fetch('/api/upload',{method:'POST',body:fd})
      .then(r=>r.json())
      .then(d=>sa('✓ '+f.name+' — ih:'+d.infohash+' size:'+fB(d.size_estimate),'ok'))
      .catch(e=>sa('✗ '+f.name+': '+e.message,'er'));
  });
}
function purgeInactive(){
  if(!confirm('Remove torrents with no announce in the last 12 hours?')) return;
  API.del('/api/stats/purge?keep_active=true&inactive_hours=12')
    .then(d=>{sa('Purged: '+JSON.stringify(d),'ok'); setTimeout(load,600);})
    .catch(e=>sa('Error: '+e.message,'er'));
}
function purge(){
  if(!confirm('Remove all stopped/finished torrents from stats?')) return;
  API.del('/api/stats/purge')
    .then(d=>{sa('Purged: '+JSON.stringify(d),'ok'); setTimeout(load,600);})
    .catch(e=>sa('Error: '+e.message,'er'));
}
function load(){
  Promise.all([API.get('/api/stats'),API.get('/api/config')])
  .then(([s,c])=>{
    _data=s;
    _tgt=parseFloat((c.spoofing&&c.spoofing.target_ratio)||1.6)||1.6;
    document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString();
    render();
  })
  .catch(e=>{
    document.getElementById('tbody').innerHTML='<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--er)">API error: '+e.message+'</td></tr>';
  });
}
load(); setInterval(load,15000);

initUI('torrents');
</script>
</body>
</html>
