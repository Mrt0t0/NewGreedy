[DEFAULT]
listen_port = 3456

; ── Upload multipliers ─────────────────────────────────────────────────────────
max_upload_multiplier = 1.6
seeding_multiplier = 1.2
; ±25% variance — harder to detect statistically than the default ±10%
randomization_factor = 0.25

; ── Speed cap ──────────────────────────────────────────────────────────────────
max_simulated_speed_mbps = 7.6

; ── Ratio limiter & cooldown ───────────────────────────────────────────────────
global_ratio_limit = 1.8
cooldown_duration_minutes = 10

; ── Network ────────────────────────────────────────────────────────────────────
; Tracker request timeout in seconds (standard mode only)
tracker_timeout = 5

; ── HTTPS — standard mode only ────────────────────────────────────────────────
; Enables HTTPS on the proxy listener (not needed for mitmproxy mode)
enable_https = false
ssl_certfile = cert.pem
ssl_keyfile = key.pem
; Auto-generate self-signed cert if missing (dev only)
ssl_autogenerate_cert = true
; Set to false only if tracker uses a self-signed certificate
ssl_verify_trackers = true

[LOGGING]
log_file = newgreedy.log
