; ============================================================
;  NewGreedy v1.3 -- Configuration
;  Edit this file, then reload with SIGHUP (Linux/macOS)
;  or restart the script (Windows).
; ============================================================

[proxy]
; Port NewGreedy listens on
listen_port               = 3456

; Seconds before a tracker request times out
tracker_timeout           = 5

; ============================================================
[spoofing]
; upload_mode controls how the reported upload is calculated.
;
;   ratio_based  (default, recommended)
;     Reported upload = total downloaded x target_ratio
;     If you download 1 GB and target_ratio = 1.5,
;     NewGreedy will progressively report 1.5 GB uploaded.
;     Even if your real upload is 0, the report is still made.
;
;   multiplier   (v1.2 compatibility)
;     Reported upload = real upload x a multiplier.
;     If real upload is 0, reported upload is also 0.
;
upload_mode               = ratio_based

; -- ratio_based settings ------------------------------------

; Target ratio per torrent.
; 1.5 means: report 150% of what you downloaded.
; Recommended range: 1.2 to 2.5
target_ratio              = 1.5

; Hard cap per torrent. If the reported ratio reaches this
; value, NewGreedy stops boosting and sends the real upload.
; Avoids suspiciously high ratios on a single torrent.
max_ratio_per_torrent     = 3.0

; When seeding a torrent you never downloaded through this
; client (real download = 0), report this many MB per
; announce as a minimum upload credit.
; Uses a random triangular distribution (x0.4 to x1.8)
; so the value is never perfectly constant.
seed_credit_mb            = 5.0

; Catch-up speed: fraction of the remaining delta to report
; per announce. 0.15 = close 15% of the gap each time.
; Lower = slower ramp, less suspicious spikes.
; Range: 0.05 (very slow) to 0.50 (aggressive)
catch_up_factor           = 0.15

; -- common settings -----------------------------------------

; Maximum simulated upload speed in MB/s.
; Acts as an absolute cap on what can be reported per announce.
; Set this close to your real upload bandwidth.
max_simulated_speed_mbps  = 10.0

; Gaussian noise applied to the reported upload (+/- %).
; Makes the reported values look less mathematically perfect.
; Recommended: 2.0 to 5.0
upload_noise_pct          = 3.0

; When seeding from zero download (pure seeder), inject a
; plausible downloaded value proportional to reported upload.
; 0.85 means: reported_downloaded = reported_upload x 0.85
; Set to 0 to disable.
seeding_dl_ratio          = 0.85

; ============================================================
[anti_detection]

; User-Agent sent to trackers.
;   random      -- pick a random known BitTorrent client UA
;   fixed       -- always use user_agent_value below
;   passthrough -- do not change the UA sent by your client
user_agent_mode           = random

; Used only when user_agent_mode = fixed
user_agent_value          = qBittorrent/4.6.7

; Generate a peer_id consistent with the spoofed User-Agent
spoof_peer_id             = true

; Randomize the numwant / num_seeds values in announces
spoof_peers               = true

; Variance applied to peer count values (+/- %)
peer_variance             = 0.15

; Randomize the announced listening port
spoof_port                = true

; Port range used when spoof_port is enabled
port_range                = 6881-6999

; Mimic real libtorrent HTTP headers fingerprint
spoof_headers             = true

; Intercept and patch /scrape responses
intercept_scrape          = true

; Only apply spoofing to these tracker domains (comma-separated).
; Leave empty to spoof all trackers.
tracker_whitelist         =

; Never apply spoofing to these tracker domains (comma-separated).
; Leave empty to disable the blacklist.
tracker_blacklist         =

; ============================================================
[ssl]
; Verify SSL certificates when connecting to trackers.
; Set to false only if you have certificate issues.
ssl_verify_trackers       = true

; ============================================================
[stats]
; Save torrent stats to disk so ratios persist across restarts.
persist_stats             = true

; File used to store persistent stats.
stats_file                = stats.json

; ============================================================
[advanced]
; Minimum seconds between two announce requests to the same
; tracker host. Prevents flooding.
min_announce_interval     = 1800
