[proxy]
listen_port               = 3456
tracker_timeout           = 5

[multiplier]
max_upload_multiplier     = 1.6
seeding_multiplier        = 1.2
randomization_factor      = 0.25
max_simulated_speed_mbps  = 7.6
global_ratio_limit        = 1.8
cooldown_duration_minutes = 10
max_upload_slope          = 2.0

[anti_detection]
spoof_user_agent          = true
; Modes : random | fixed | passthrough
user_agent_mode           = random
; Used only when user_agent_mode = fixed :
user_agent_value          = qBittorrent/4.6.7
spoof_peers               = true
peer_variance             = 0.15

[ssl]
enable_https              = false
ssl_certfile              = cert.pem
ssl_keyfile               = key.pem
ssl_autogenerate_cert     = true
ssl_verify_trackers       = true

[stats]
persist_stats             = true
stats_file                = stats.json

[logging]
log_file                  = newgreedy.log
