[proxy]
listen_port               = 3456

[spoofing]
# Mode de calcul de l'upload reporté : ratio_based ou multiplier
upload_mode               = ratio_based

# Ratio cible UL/DL (sera randomisé entre 1.42-1.54 au premier démarrage si = 1.5)
target_ratio              = 1.5

# Ratio maximum autorisé par torrent avant de stopper le boost
max_ratio_per_torrent     = 3.0

# Crédit d'upload en Mo par announce pour les seeders purs (DL=0)
seed_credit_mb            = 5.0

# Facteur de rattrapage : quelle fraction du delta est déclarée par announce
catch_up_factor           = 0.15

# Vitesse d'upload simulée maximum en MB/s (plafond anti-détection)
max_simulated_speed_mbps  = 10.0

# Bruit gaussien +/- % appliqué à l'upload reporté
upload_noise_pct          = 3.0

# Ratio DL/UL injecté pour les seeders purs (héritage v1.2, non utilisé en ratio_based)
seeding_dl_ratio          = 0.85

[anti_detection]
# Spoofing du User-Agent : random | fixed | passthrough
user_agent_mode           = random

# UA utilisé si user_agent_mode = fixed
user_agent_value          = qBittorrent/4.6.7

# Active le spoofing du User-Agent
spoof_user_agent          = true

# Génère un peer_id cohérent avec le UA spoofé (rotation toutes les 4-6h)
spoof_peer_id             = true

# Randomise le port annoncé dans la plage ci-dessous
spoof_port                = true
port_range                = 6881-6999

# Varie légèrement le nombre de peers annoncés
spoof_peers               = true
peer_variance             = 0.15

# Supprime les headers révélant la présence d'un proxy
spoof_headers             = true

# Domaines à toujours spoofer (vide = tous)
tracker_whitelist         =

# Domaines à ne jamais spoofer (vide = aucun)
tracker_blacklist         =

[stats]
# Sauvegarde les stats cumulatives entre les redémarrages
persist_stats             = true
stats_file                = stats.json

[advanced]
# Intervalle minimum entre deux announces vers le même tracker (secondes)
min_announce_interval     = 1800
