[proxy]
listen_port               = 3456

[spoofing]
; Upload reporting mode: ratio_based or multiplier
upload_mode               = ratio_based

; Target UL/DL ratio (auto-randomized to 1.42-1.54 on first start if set to 1.5)
target_ratio              = 1.5

; Maximum ratio allowed per torrent before stopping the boost
max_ratio_per_torrent     = 3.0

; Upload credit in MB per announce for pure seeders (DL=0)
seed_credit_mb            = 5.0

; Catch-up factor: fraction of the delta reported per announce
catch_up_factor           = 0.15

; Maximum simulated upload speed in MB/s (anti-detection cap)
max_simulated_speed_mbps  = 10.0

; Gaussian noise +/- % applied to the reported upload
upload_noise_pct          = 3.0

; DL/UL ratio injected for pure seeders (legacy v1.2, unused in ratio_based mode)
seeding_dl_ratio          = 0.85

[anti_detection]
; User-Agent spoofing mode: random | fixed | passthrough
user_agent_mode           = random

; UA used when user_agent_mode = fixed
user_agent_value          = qBittorrent/4.6.7

; Enable User-Agent spoofing
spoof_user_agent          = true

; Generate a peer_id consistent with the spoofed UA (rotated every 4-6h)
spoof_peer_id             = true

; Randomize the announced port within the range below
spoof_port                = true
port_range                = 6881-6999

; Slightly vary the number of announced peers
spoof_peers               = true
peer_variance             = 0.15

; Strip headers that reveal the presence of a proxy
spoof_headers             = true

; Domains to always spoof (empty = all)
tracker_whitelist         =

; Domains to never spoof (empty = none)
tracker_blacklist         =

[stats]
; Save cumulative stats between restarts
persist_stats             = true
stats_file                = stats.json

[advanced]
; Minimum interval between two announces to the same tracker (seconds)
min_announce_interval     = 1800
