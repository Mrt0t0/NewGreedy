[proxy]
; local proxy port — point your torrent client here
listen_port               = 3456
; seconds before tracker request times out
tracker_timeout           = 5

[spoofing]
; ratio_based is the only supported mode
upload_mode               = ratio_based
; target upload/download ratio
target_ratio              = 1.60
; internal target = target_ratio + buffer
target_ratio_buffer       = 0.03
; space out announce timing to avoid clustering
anti_clustering           = true
; hard cap per torrent
max_ratio_per_torrent     = 3.0
; hard cap across all torrents for one tracker domain
max_global_ratio_per_tracker = 2.5
; aggressiveness of catch-up toward target (0.0–1.0)
catch_up_factor           = 0.22
; MB credited per announce for pure seeders (no DL history)
seed_credit_mb            = 5.0
; target total UL for pure seeders (used for progress bar)
seed_target_mb            = 500.0
; unused — reserved
seeding_dl_ratio          = 0.85
; maximum simulated upload speed in MB/s
max_simulated_speed_mbps  = 10.0
; percentage noise applied to each upload increment
upload_noise_pct          = 3.0
; probability of deliberate stagnation per announce
stagnation_probability    = 0.03
; stop injection cleanly when target_ratio is reached
auto_stop_at_target       = true

[anti_detection]
; random: rotate UA with peer_id | fixed: use user_agent_value
user_agent_mode           = random
; used when user_agent_mode = fixed
user_agent_value          = qBittorrent/4.6.8
; replace User-Agent header to match peer_id client
spoof_user_agent          = true
; rotate peer_id per torrent session
spoof_peer_id             = true
; randomise numwant ±15%
spoof_peers               = true
; numwant variance factor
peer_variance             = 0.15
; assign a stable spoofed port per torrent
spoof_port                = true
; range to pick the spoofed port from
port_range                = 6881-6999
; inject realistic Accept / Accept-Language headers
spoof_headers             = true
; silently drop scrape requests
intercept_scrape          = true
; comma-separated domains; empty = allow all
tracker_whitelist         =
; comma-separated domains to ignore
tracker_blacklist         =

[ssl]
; verify tracker SSL certificates
ssl_verify_trackers       = true

[stats]
; save stats.json on each announce batch
persist_stats             = true
; remove torrent from stats on event=stopped
auto_purge_stopped        = true

[web]
; enable the FastAPI web UI
web_enabled               = true
; bind address for the web UI
web_host                  = 0.0.0.0
; port for the web UI
web_port                  = 8080

[advanced]
; minimum seconds between announces for the same torrent
min_announce_interval     = 1800
; DEBUG | INFO | WARNING | ERROR
log_level                 = INFO
; unused — reserved
multi_tracker_delay_min   = 0.5
; unused — reserved
multi_tracker_delay_max   = 8.0
; probability of injecting a fake event=started
event_anomaly_probability = 0.03
; probability of adding a corrupt= field
corrupt_field_probability = 0.05
; consecutive zero-DL announces before STALL_NET flag
stall_announce_threshold  = 8
; minimum announces before stagnation can trigger
min_announces_before_stagnation = 10
; ±jitter applied to the announce interval (fraction)
interval_jitter_pct       = 0.08
; active injection window; e.g. 8-22 limits to daytime
inject_hours              = 0-23
