[DEFAULT]
listen_port = 3456

; ── Upload multipliers ─────────────────────────────────────────────────────────
; Multiplier applied to reported upload while downloading
max_upload_multiplier = 1.6

; Multiplier applied to reported upload while seeding (left=0)
seeding_multiplier = 1.2

; Random variance applied to the multiplier (±factor)
; 0.25 = ±25% — higher values are harder to detect statistically
randomization_factor = 0.25

; ── Speed cap ──────────────────────────────────────────────────────────────────
; Maximum simulated upload speed in Mbps
; Prevents unrealistic upload spikes between announces
max_simulated_speed_mbps = 7.6

; ── Ratio limiter & cooldown ───────────────────────────────────────────────────
; Global upload/download ratio threshold before entering cooldown
global_ratio_limit = 1.8

; Duration of the cooldown period in minutes
cooldown_duration_minutes = 10

; ── Network ────────────────────────────────────────────────────────────────────
; Timeout in seconds for tracker requests (newgreedy.py mode only)
tracker_timeout = 5

; ── HTTPS — newgreedy.py mode only ────────────────────────────────────────────
; Enable HTTPS on the proxy listener
; Note: even with enable_https=false, HTTP tracker forwards work on HTTPS trackers
; For full HTTPS announce interception, use newgreedy_addon.py (mitmproxy mode)
enable_https = false

; Path to SSL certificate and private key
; For Let's Encrypt: /etc/letsencrypt/live/your-domain.com/fullchain.pem
ssl_certfile = cert.pem
ssl_keyfile = key.pem

; Auto-generate a self-signed certificate if cert/key are missing (dev only)
ssl_autogenerate_cert = true

; Verify SSL certificates of remote trackers
; Set to false only if the tracker uses a self-signed certificate
ssl_verify_trackers = true

[LOGGING]
; Log file path (relative to working directory or absolute)
log_file = newgreedy.log
