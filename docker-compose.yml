# docker-compose.yml -- NewGreedy v1.3
# Usage:
#   docker compose up -d              # start
#   docker compose logs -f            # follow logs
#   docker compose pull && docker compose up -d --build   # update

services:
  newgreedy:
    build: .
    image: newgreedy:1.3
    container_name: newgreedy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3456:3456"   # only exposed on localhost
    volumes:
      # Persistent data: stats.json + newgreedy.log
      - newgreedy_data:/app/data
      # Optional: mount your own config.ini
      # - ./config.ini:/app/config.ini:ro
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "curl", "-x", "http://localhost:3456", "-s", "--max-time", "3",
             "http://example.com"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  newgreedy_data:
    driver: local
